<div class="modal fade" id="modal-generic" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border border-secondary shadow-lg">
            <div class="modal-header text-bg-dark-header border-secondary">
                <h5 class="modal-title"></h5>
                <button type="button" class="btn btn-light rounded-5 p-2" data-bs-dismiss="modal" aria-label="Close">
                    <span class="d-flex align-items-center">{% include 'core/helpers/icon.html' with icon='x-lg' size='1.5rem' %}</span>
                </button>
            </div>
            <div class="modal-container">Place modal content here.</div>
        </div>
    </div>
</div>
